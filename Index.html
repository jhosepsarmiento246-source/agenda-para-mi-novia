<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agenda Corazón Marrón 🤎</title>
  <meta name="theme-color" content="#A0522D"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 20px; background: linear-gradient(to bottom, #FDF5E6, #F5F5DC); min-height: 100vh; color: #3C2F2F; }
    h1, h2 { text-align: center; color: #8B5A2B; margin: 40px 0 30px; }
    .buttons { display: flex; flex-direction: column; gap: 25px; max-width: 400px; margin: 0 auto; }
    .big-btn { background: #A0522D; color: white; border: none; padding: 25px; font-size: 1.4em; border-radius: 16px; cursor: pointer; box-shadow: 0 6px 15px rgba(160,82,45,0.3); }
    .big-btn:hover { transform: translateY(-4px); background: #B5651D; }
    #content { display: none; max-width: 500px; margin: 20px auto; }
    form { display: flex; flex-direction: column; gap: 16px; }
    input, textarea, select, button { padding: 14px; font-size: 1.1em; border-radius: 10px; border: 1px solid #C19A6B; }
    button[type="submit"] { background: #C19A6B; color: #3C2F2F; font-weight: bold; }
    .back-btn { background: #8B5A2B; color: white; padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; }
    ul { list-style: none; padding: 0; }
    li { background: white; padding: 16px; margin: 12px 0; border-radius: 12px; box-shadow: 0 3px 10px rgba(139,90,43,0.1); border-left: 5px solid #C19A6B; }
    .due-soon { color: #B5651D; font-weight: bold; }
    .overdue { color: #8B0000; font-weight: bold; }
    .done { opacity: 0.7; }
  </style>
</head>
<body>
  <div id="home">
    <h1>Agenda de mi amor 🤎</h1>
    <div class="buttons">
      <button class="big-btn" onclick="showSection('list')">Ver tabla de tareas</button>
      <button class="big-btn" onclick="showSection('add')">Añadir tarea</button>
      <button class="big-btn" style="background:#C19A6B;" onclick="subscribeToPush()">Activar Notificaciones Push 🤎</button>
    </div>
  </div>

  <div id="content">
    <button class="back-btn" onclick="showSection('home')">← Volver</button>
    
    <div id="listSection" style="display:none;">
      <h2>Mis Tareas 📋</h2>
      <div id="taskList"></div>
    </div>

    <div id="addSection" style="display:none;">
      <h2>Añadir Nueva Tarea 📝</h2>
      <form id="taskForm">
        <input type="text" id="materia" placeholder="Materia" required/>
        <input type="text" id="tarea" placeholder="Nombre del trabajo" required/>
        <textarea id="notas" placeholder="Notas adicionales (opcional)"></textarea>
        <select id="prioridad" required>
          <option value="" disabled selected>Prioridad</option>
          <option value="baja">Baja</option>
          <option value="media">Media</option>
          <option value="alta">Alta</option>
        </select>
        <input type="datetime-local" id="fecha" required/>
        <button type="submit">Guardar Tarea</button>
      </form>
    </div>
  </div>

  <!-- FIREBASE SDK (push notifications) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
    import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-messaging.js";

    const firebaseConfig = {
      // === PEGA AQUÍ TU CONFIG DE FIREBASE ===
      const firebaseConfig = {
  apiKey: "BDz36LZ1cPmBbXtQFvXxtIVbRHx9XXFgCzydPZQZKFrzTL00sUsej2jKoOlt5JA7wqMP92CcKr3Iqf7ai2Gf0wA",
  authDomain: "agenda-para-mi-amor.firebaseapp.com",
  projectId: "agenda-para-mi-amor",
  storageBucket: "agenda-para-mi-amor.appspot.com",
  messagingSenderId: "123456789012",
  appId: "1:123456789012:web:abcdef123456"
};
    };

    const app = initializeApp(firebaseConfig);
    window.messaging = getMessaging(app);
  </script>

  <script src="app.js"></script>
</body>
</html>
